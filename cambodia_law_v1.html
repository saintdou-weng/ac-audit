let DB = loadData();

// ═══════════════════════════════════════════════════════
// LANG
// ═══════════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['cn','en','bi'][i] === l);
  });
  refreshAll();
}

function t(cn, en) {
  if (lang === 'cn') return cn || '';
  if (lang === 'en') return en || '';
  return (cn || '') + (en ? `<br><span style="color:var(--text-light);font-size:0.88em">${en}</span>` : '');
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function renderSidebar(data) {
  const list = document.getElementById('law-list');
  list.innerHTML = '';
  data.forEach(law => {
    const active = law.id === currentLawId;
    const div = document.createElement('div');
    div.className = 'law-group';
    div.innerHTML = `
      <div class="law-item ${active ? 'active' : ''}" onclick="selectLaw('${law.id}')">
        <div class="law-dot" style="background:${law.color}"></div>
        <div class="law-name">
          <div class="law-name-cn">${law.nameCN}</div>
          <div class="law-name-en">${law.nameEN}</div>
        </div>
        <div class="law-badge">${law.chapters.length}章</div>
      </div>
      <div class="chapter-list ${active ? 'open' : ''}" id="cl-${law.id}">
        ${law.chapters.map(ch => `
          <div class="chapter-item ${ch.id === currentChapterId ? 'active' : ''}" onclick="selectChapter('${law.id}','${ch.id}')">
            ${lang === 'en' ? ch.titleEN : ch.titleCN}
          </div>
        `).join('')}
        <div class="chapter-item" style="color:var(--gold);opacity:0.7" onclick="openAddChapter('${law.id}')">+ 新增章節</div>
      </div>
    `;
    list.appendChild(div);
  });
}

function doSearch(q) {
  if (!q.trim()) { renderSidebar(DB); return; }
  const lq = q.toLowerCase();
  const filtered = DB.filter(law =>
    law.nameCN.includes(q) || law.nameEN.toLowerCase().includes(lq) ||
    law.summaryCN?.includes(q) || law.summaryEN?.toLowerCase().includes(lq) ||
    law.chapters.some(ch => ch.titleCN.includes(q) || ch.titleEN.toLowerCase().includes(lq))
  );
  renderSidebar(filtered);
}

// ═══════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════
function selectLaw(id) {
  currentLawId = id;
  currentChapterId = null;
  currentViewTab = 'overview';
  renderSidebar(DB);
  showLawOverview(id);
  updateTopbar();
}

function selectChapter(lawId, chId) {
  currentLawId = lawId;
  currentChapterId = chId;
  currentViewTab = 'overview';
  renderSidebar(DB);
  showChapterView(lawId, chId);
  updateTopbar();
}

function showLawOverview(id) {
  const law = DB.find(l => l.id === id);
  if (!law) return;
  showOnlySection('law-overview');
  document.getElementById('breadcrumb').innerHTML = `<span>${t(law.nameCN, law.nameEN)}</span>`;

  const el = document.getElementById('law-overview');
  const highlights = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'highlight')).length;
  const examples = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'example')).length;
  const articles = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'article')).length;

  el.innerHTML = `
    <div class="law-header">
      <div style="margin-bottom:8px">
        <span class="law-header-dot" style="background:${law.color}"></span>
        <span style="font-size:11px;color:var(--gold-light);letter-spacing:1px;text-transform:uppercase">Law / 法律</span>
      </div>
      <div class="law-header-title">${law.nameCN}</div>
      <div class="law-header-sub">${law.nameEN}</div>
      <div class="law-meta">
        <div class="law-meta-item">生效年份 <strong>${law.year}</strong></div>
        ${law.amended ? `<div class="law-meta-item">修訂 <strong>${law.amended}</strong></div>` : ''}
        <div class="law-meta-item">章節 <strong>${law.chapters.length}</strong></div>
        <div class="law-meta-item">條文 <strong>${articles}</strong></div>
        <div class="law-meta-item">⚠️ 重要提醒 <strong>${highlights}</strong></div>
        <div class="law-meta-item">💡 範例 <strong>${examples}</strong></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button style="padding:6px 14px;font-size:12px;border-radius:5px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;cursor:pointer;font-family:inherit" onclick="openEditLaw('${law.id}')">✏️ 編輯基本資料</button>
        <button style="padding:6px 14px;font-size:12px;border-radius:5px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;cursor:pointer;font-family:inherit" onclick="openAddChapter('${law.id}')">+ 新增章節</button>
        <button style="padding:6px 14px;font-size:12px;border-radius:5px;border:1px solid rgba(220,38,38,0.5);background:rgba(220,38,38,0.15);color:#fca5a5;cursor:pointer;font-family:inherit" onclick="deleteLaw('${law.id}')">🗑 刪除法律</button>
      </div>
    </div>

    ${law.summaryCN ? `
    <div class="law-summary-box">
      <div class="section-title">📋 法律摘要</div>
      <div class="summary-text">${t(law.summaryCN, law.summaryEN)}</div>
      ${law.scope ? `<div style="margin-top:10px;font-size:12px;color:var(--text-light)">📌 適用範圍：${law.scope}</div>` : ''}
    </div>` : ''}

    <div class="section-title">📂 章節列表</div>
    <div class="chapters-grid">
      ${law.chapters.map((ch, i) => {
        const hi = (ch.items || []).filter(x => x.type === 'highlight').length;
        const ex = (ch.items || []).filter(x => x.type === 'example').length;
        const ar = (ch.items || []).filter(x => x.type === 'article').length;
        return `
        <div class="chapter-card" onclick="selectChapter('${law.id}','${ch.id}')">
          <div class="chapter-card-num">第 ${i+1} 章</div>
          <div class="chapter-card-title">${ch.titleCN}</div>
          <div class="chapter-card-en">${ch.titleEN}</div>
          <div class="chapter-card-summary">${(ch.summaryCN || '').substring(0,80)}${(ch.summaryCN||'').length > 80 ? '...' : ''}</div>
          <div class="chip-row">
            ${ar ? `<span class="chip blue">📄 ${ar}條</span>` : ''}
            ${hi ? `<span class="chip">⚠️ ${hi}重點</span>` : ''}
            ${ex ? `<span class="chip green">💡 ${ex}範例</span>` : ''}
          </div>
        </div>`;
      }).join('')}
      <div class="chapter-card" style="border-style:dashed;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--text-light);cursor:pointer" onclick="openAddChapter('${law.id}')">
        <div style="text-align:center"><div style="font-size:24px;margin-bottom:6px">+</div><div style="font-size:12px">新增章節</div></div>
      </div>
    </div>
  `;
}

function showChapterView(lawId, chId) {
  const law = DB.find(l => l.id === lawId);
  const ch = law?.chapters.find(c => c.id === chId);
  if (!law || !ch) return;
  showOnlySection('chapter-view');
  document.getElementById('breadcrumb').innerHTML = `${t(law.nameCN, law.nameEN)} › <span>${t(ch.titleCN, ch.titleEN)}</span>`;

  const items = ch.items || [];
  const renderItem = (item) => {
    if (item.type === 'article') return `
      <div class="article-item">
        ${item.num ? `<div class="article-num">${item.num}</div>` : ''}
        <div class="article-text">${t(item.textCN, item.textEN)}</div>
        <div class="actions-row">
          <button class="article-edit-btn" onclick="openEditArticle('${lawId}','${chId}','${item.id}')">✏️ 編輯</button>
          <button class="article-edit-btn del" onclick="deleteArticle('${lawId}','${chId}','${item.id}')">🗑 刪除</button>
        </div>
      </div>`;
    if (item.type === 'highlight') return `
      <div class="highlight-box">
        <div class="highlight-label">⚠️ 重要提醒 / Key Point</div>
        <div class="highlight-text">${t(item.textCN, item.textEN)}</div>
        <div class="actions-row">
          <button class="article-edit-btn" onclick="openEditArticle('${lawId}','${chId}','${item.id}')">✏️ 編輯</button>
          <button class="article-edit-btn del" onclick="deleteArticle('${lawId}','${chId}','${item.id}')">🗑 刪除</button>
        </div>
      </div>`;
    if (item.type === 'example') return `
      <div class="example-box">
        <div class="example-label">💡 範例說明 / Example</div>
        <div class="example-text">${t(item.textCN, item.textEN)}</div>
        <div class="actions-row">
          <button class="article-edit-btn" onclick="openEditArticle('${lawId}','${chId}','${item.id}')">✏️ 編輯</button>
          <button class="article-edit-btn del" onclick="deleteArticle('${lawId}','${chId}','${item.id}')">🗑 刪除</button>
        </div>
      </div>`;
    return '';
  };

  const articleItems = currentViewTab === 'articles' ? items.filter(i => i.type === 'article') :
                       currentViewTab === 'highlights' ? items.filter(i => i.type === 'highlight') :
                       currentViewTab === 'examples' ? items.filter(i => i.type === 'example') :
                       items;

  document.getElementById('chapter-view').innerHTML = `
    <div class="chapter-header">
      <button class="ch-back" onclick="selectLaw('${lawId}')">← 返回</button>
      <div>
        <div class="ch-title">${t(ch.titleCN, ch.titleEN)}</div>
        <div class="ch-title-en">${law.nameCN} · ${law.nameEN}</div>
      </div>
    </div>

    ${ch.summaryCN ? `
    <div class="content-block">
      <div class="block-title"><span class="block-icon">📋</span> 章節摘要 Chapter Summary</div>
      <div class="summary-text">${t(ch.summaryCN, ch.summaryEN)}</div>
    </div>` : ''}

    <div class="content-block">
      <div class="block-title"><span class="block-icon">📄</span> 
        ${currentViewTab === 'articles' ? '條文 Articles' :
          currentViewTab === 'highlights' ? '重要提醒 Key Points' :
          currentViewTab === 'examples' ? '範例說明 Examples' : '全部內容 All Content'}
        <span style="margin-left:auto;font-size:12px;font-weight:400;color:var(--text-light)">${articleItems.length} 項</span>
      </div>
      ${articleItems.length ? articleItems.map(renderItem).join('') :
        `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">此分類暫無內容<br>點選上方「+ 條文」按鈕新增</div></div>`}
      <div style="margin-top:16px">
        <button class="article-edit-btn" style="padding:7px 16px;font-size:12px" onclick="openAddArticle()">+ 新增內容</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="article-edit-btn" style="padding:7px 14px" onclick="editCurrentChapter()">✏️ 編輯章節摘要</button>
      <button class="article-edit-btn del" style="padding:7px 14px" onclick="deleteChapter('${lawId}','${chId}')">🗑 刪除本章節</button>
    </div>
  `;
}

function showOnlySection(id) {
  ['welcome-screen','law-overview','chapter-view','compare-view'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function setViewTab(tab) {
  currentViewTab = tab;
  document.querySelectorAll('.view-tab').forEach((b,i) => {
    b.classList.toggle('active', ['overview','articles','highlights','examples'][i] === tab);
  });
  if (currentChapterId) showChapterView(currentLawId, currentChapterId);
}

function updateTopbar() {
  document.getElementById('btn-edit-chapter').style.display = currentChapterId ? '' : 'none';
  document.getElementById('btn-add-article').style.display = currentChapterId ? '' : 'none';
}

function refreshAll() {
  renderSidebar(DB);
  renderWelcomeCards();
  if (currentChapterId) showChapterView(currentLawId, currentChapterId);
  else if (currentLawId) showLawOverview(currentLawId);
}

function renderWelcomeCards() {
  const el = document.getElementById('welcome-cards');
  if (!el) return;
  el.innerHTML = DB.map(law => `
    <div class="welcome-card" onclick="selectLaw('${law.id}')">
      <div class="wc-icon" style="color:${law.color}">📗</div>
      <div class="wc-title">${law.nameCN}</div>
      <div class="wc-sub">${law.nameEN} · ${law.year}</div>
      <div class="wc-sub" style="margin-top:4px;color:${law.color}">${law.chapters.length} 章節</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════
// COMPARE VIEW
// ═══════════════════════════════════════════════════════
function compareView() {
  showOnlySection('compare-view');
  currentLawId = null; currentChapterId = null;
  renderSidebar(DB);
  document.getElementById('breadcrumb').innerHTML = '法律對比分析';
  document.getElementById('btn-edit-chapter').style.display = 'none';
  document.getElementById('btn-add-article').style.display = 'none';

  const options = DB.map(l => `<option value="${l.id}">${l.nameCN}</option>`).join('');
  document.getElementById('compare-view').innerHTML = `
    <div class="compare-toolbar">
      <label>法律 A：</label>
      <select id="cmp-a" onchange="renderCompare()">${options}</select>
      <label style="margin-left:12px">法律 B：</label>
      <select id="cmp-b" onchange="renderCompare()">${options.replace('value="'+DB[0].id+'"','').replace(`value="${DB[1]?.id||''}"`,`value="${DB[1]?.id||''}" selected`)}</select>
    </div>
    <div id="compare-body" class="compare-grid"></div>
  `;
  if (DB.length > 1) { document.getElementById('cmp-b').value = DB[1].id; }
  renderCompare();
}

function renderCompare() {
  const aId = document.getElementById('cmp-a')?.value;
  const bId = document.getElementById('cmp-b')?.value;
  const a = DB.find(l => l.id === aId);
  const b = DB.find(l => l.id === bId);
  if (!a || !b) return;

  const panel = (law) => {
    const highlights = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'highlight'));
    const examples = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'example'));
    const articles = law.chapters.flatMap(ch => (ch.items || []).filter(i => i.type === 'article'));
    return `
      <div class="compare-panel">
        <div class="compare-panel-header" style="background:${law.color}">
          <span>📗</span> ${law.nameCN} — ${law.nameEN}
        </div>
        <div class="compare-panel-body">
          <div class="compare-row"><div class="compare-label">年份</div><div class="compare-val">${law.year} ${law.amended ? '(修訂：'+law.amended+')' : ''}</div></div>
          <div class="compare-row"><div class="compare-label">章節數</div><div class="compare-val">${law.chapters.length} 章</div></div>
          <div class="compare-row"><div class="compare-label">條文</div><div class="compare-val">${articles.length} 條</div></div>
          <div class="compare-row"><div class="compare-label">重要提醒</div><div class="compare-val">${highlights.length} 項</div></div>
          <div class="compare-row"><div class="compare-label">範例</div><div class="compare-val">${examples.length} 項</div></div>
          <div class="compare-row"><div class="compare-label">適用對象</div><div class="compare-val">${law.scope || '—'}</div></div>
          <div class="compare-row"><div class="compare-label">摘要</div><div class="compare-val">${(law.summaryCN||'').substring(0,150)}...</div></div>
          <div style="margin-top:12px"><button class="article-edit-btn" onclick="selectLaw('${law.id}')">查看完整內容 →</button></div>
        </div>
      </div>`;
  };

  document.getElementById('compare-body').innerHTML = panel(a) + panel(b);
}

// ═══════════════════════════════════════════════════════
// MODALS — LAW
// ═══════════════════════════════════════════════════════
function openAddLaw() {
  editingLawId = null;
  document.getElementById('modal-law-title').textContent = '新增法律 Add Law';
  ['fl-nameCN','fl-nameEN','fl-year','fl-amended','fl-summaryCN','fl-summaryEN','fl-scope'].forEach(id => document.getElementById(id).value = '');
  selectedColor = '#2563eb';
  updateColorSel();
  openModal('modal-law');
}

function openEditLaw(id) {
  const law = DB.find(l => l.id === id);
  if (!law) return;
  editingLawId = id;
  document.getElementById('modal-law-title').textContent = '編輯法律 Edit Law';
  document.getElementById('fl-nameCN').value = law.nameCN;
  document.getElementById('fl-nameEN').value = law.nameEN;
  document.getElementById('fl-year').value = law.year || '';
  document.getElementById('fl-amended').value = law.amended || '';
  document.getElementById('fl-summaryCN').value = law.summaryCN || '';
  document.getElementById('fl-summaryEN').value = law.summaryEN || '';
  document.getElementById('fl-scope').value = law.scope || '';
  selectedColor = law.color || '#2563eb';
  updateColorSel();
  openModal('modal-law');
}

function saveLaw() {
  const nameCN = document.getElementById('fl-nameCN').value.trim();
  const nameEN = document.getElementById('fl-nameEN').value.trim();
  if (!nameCN && !nameEN) { toast('請輸入法律名稱'); return; }
  if (editingLawId) {
    const law = DB.find(l => l.id === editingLawId);
    Object.assign(law, { nameCN, nameEN, year: +document.getElementById('fl-year').value || '', amended: document.getElementById('fl-amended').value, color: selectedColor, summaryCN: document.getElementById('fl-summaryCN').value, summaryEN: document.getElementById('fl-summaryEN').value, scope: document.getElementById('fl-scope').value });
  } else {
    DB.push({ id: 'law_' + Date.now(), nameCN, nameEN, year: +document.getElementById('fl-year').value || new Date().getFullYear(), amended: document.getElementById('fl-amended').value, color: selectedColor, summaryCN: document.getElementById('fl-summaryCN').value, summaryEN: document.getElementById('fl-summaryEN').value, scope: document.getElementById('fl-scope').value, chapters: [] });
  }
  saveData(DB);
  closeModal('modal-law');
  refreshAll();
  if (editingLawId) showLawOverview(editingLawId);
  toast(editingLawId ? '已更新法律資料' : '已新增法律');
}

function deleteLaw(id) {
  if (!confirm('確認刪除此法律及所有章節？此操作無法復原。')) return;
  DB = DB.filter(l => l.id !== id);
  currentLawId = null; currentChapterId = null;
  saveData(DB);
  renderSidebar(DB);
  document.getElementById('welcome-screen').style.display = '';
  document.getElementById('law-overview').style.display = 'none';
  document.getElementById('chapter-view').style.display = 'none';
  document.getElementById('breadcrumb').innerHTML = '柬埔寨法律參考系統';
  renderWelcomeCards();
  toast('已刪除法律');
}

// ═══════════════════════════════════════════════════════
// MODALS — CHAPTER
// ═══════════════════════════════════════════════════════
let addChapterLawId = null;

function openAddChapter(lawId) {
  addChapterLawId = lawId;
  editingChapterId = null;
  document.getElementById('modal-ch-title').textContent = '新增章節 Add Chapter';
  ['fch-titleCN','fch-titleEN','fch-summaryCN','fch-summaryEN'].forEach(id => document.getElementById(id).value = '');
  openModal('modal-chapter');
}

function editCurrentChapter() {
  const law = DB.find(l => l.id === currentLawId);
  const ch = law?.chapters.find(c => c.id === currentChapterId);
  if (!ch) return;
  addChapterLawId = currentLawId;
  editingChapterId = currentChapterId;
  document.getElementById('modal-ch-title').textContent = '編輯章節 Edit Chapter';
  document.getElementById('fch-titleCN').value = ch.titleCN;
  document.getElementById('fch-titleEN').value = ch.titleEN;
  document.getElementById('fch-summaryCN').value = ch.summaryCN || '';
  document.getElementById('fch-summaryEN').value = ch.summaryEN || '';
  openModal('modal-chapter');
}

function saveChapter() {
  const titleCN = document.getElementById('fch-titleCN').value.trim();
  const titleEN = document.getElementById('fch-titleEN').value.trim();
  if (!titleCN && !titleEN) { toast('請輸入章節標題'); return; }
  const law = DB.find(l => l.id === addChapterLawId);
  if (!law) return;
  if (editingChapterId) {
    const ch = law.chapters.find(c => c.id === editingChapterId);
    Object.assign(ch, { titleCN, titleEN, summaryCN: document.getElementById('fch-summaryCN').value, summaryEN: document.getElementById('fch-summaryEN').value });
  } else {
    law.chapters.push({ id: 'ch_' + Date.now(), titleCN, titleEN, summaryCN: document.getElementById('fch-summaryCN').value, summaryEN: document.getElementById('fch-summaryEN').value, items: [] });
  }
  saveData(DB);
  closeModal('modal-chapter');
  refreshAll();
  if (editingChapterId) showChapterView(addChapterLawId, editingChapterId);
  else showLawOverview(addChapterLawId);
  toast(editingChapterId ? '已更新章節' : '已新增章節');
}

function deleteChapter(lawId, chId) {
  if (!confirm('確認刪除此章節及所有條文？')) return;
  const law = DB.find(l => l.id === lawId);
  law.chapters = law.chapters.filter(c => c.id !== chId);
  currentChapterId = null;
  saveData(DB);
  selectLaw(lawId);
  toast('已刪除章節');
}

// ═══════════════════════════════════════════════════════
// MODALS — ARTICLE
// ═══════════════════════════════════════════════════════
function openAddArticle() {
  if (!currentChapterId) return;
  editingArticleId = null;
  document.getElementById('modal-art-title').textContent = '新增內容';
  document.getElementById('fart-type').value = 'article';
  document.getElementById('fart-num').value = '';
  document.getElementById('fart-textCN').value = '';
  document.getElementById('fart-textEN').value = '';
  updateArtType();
  openModal('modal-article');
}

function openEditArticle(lawId, chId, artId) {
  const law = DB.find(l => l.id === lawId);
  const ch = law?.chapters.find(c => c.id === chId);
  const item = ch?.items.find(i => i.id === artId);
  if (!item) return;
  editingArticleId = artId;
  document.getElementById('modal-art-title').textContent = '編輯內容';
  document.getElementById('fart-type').value = item.type;
  document.getElementById('fart-num').value = item.num || '';
  document.getElementById('fart-textCN').value = item.textCN || '';
  document.getElementById('fart-textEN').value = item.textEN || '';
  updateArtType();
  openModal('modal-article');
}

function updateArtType() {
  const t = document.getElementById('fart-type').value;
  document.getElementById('fart-num-row').style.display = t === 'article' ? '' : 'none';
}

function saveArticle() {
  const textCN = document.getElementById('fart-textCN').value.trim();
  const textEN = document.getElementById('fart-textEN').value.trim();
  if (!textCN && !textEN) { toast('請輸入內容'); return; }
  const law = DB.find(l => l.id === currentLawId);
  const ch = law?.chapters.find(c => c.id === currentChapterId);
  if (!ch) return;
  if (!ch.items) ch.items = [];
  if (editingArticleId) {
    const item = ch.items.find(i => i.id === editingArticleId);
    Object.assign(item, { type: document.getElementById('fart-type').value, num: document.getElementById('fart-num').value, textCN, textEN });
  } else {
    ch.items.push({ id: 'art_' + Date.now(), type: document.getElementById('fart-type').value, num: document.getElementById('fart-num').value, textCN, textEN });
  }
  saveData(DB);
  closeModal('modal-article');
  showChapterView(currentLawId, currentChapterId);
  toast(editingArticleId ? '已更新內容' : '已新增內容');
}

function deleteArticle(lawId, chId, artId) {
  if (!confirm('確認刪除此條目？')) return;
  const law = DB.find(l => l.id === lawId);
  const ch = law?.chapters.find(c => c.id === chId);
  ch.items = ch.items.filter(i => i.id !== artId);
  saveData(DB);
  showChapterView(lawId, chId);
  toast('已刪除');
}

// ═══════════════════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cambodia_laws_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('已匯出 JSON 檔案');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      if (!confirm(`確認匯入？將載入 ${data.length} 筆法律資料（現有資料將被覆蓋）`)) return;
      DB = data;
      saveData(DB);
      currentLawId = null; currentChapterId = null;
      refreshAll();
      showOnlySection('welcome-screen');
      renderWelcomeCards();
      toast(`已匯入 ${data.length} 筆法律資料`);
    } catch(e) { toast('❌ 匯入失敗：檔案格式錯誤'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ═══════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Color picker
document.getElementById('fl-colors').addEventListener('click', e => {
  const opt = e.target.closest('.color-opt');
  if (!opt) return;
  selectedColor = opt.dataset.color;
  updateColorSel();
});

function updateColorSel() {
  document.querySelectorAll('.color-opt').forEach(o => {
    o.classList.toggle('selected', o.dataset.color === selectedColor);
  });
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderSidebar(DB);
renderWelcomeCards();
document.getElementById('welcome-screen').style.display = 'flex';
document.getElementById('law-overview').style.display = 'none';
document.getElementById('chapter-view').style.display = 'none';
document.getElementById('compare-view').style.display = 'none';
</script>
</body>
</html>
