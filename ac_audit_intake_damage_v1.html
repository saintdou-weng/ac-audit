<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>損壞/遺失報告匯入 v1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--txt:#1a1a1a;--txt2:#4a4a44;--muted:#8a8a80;
--border:#dddad2;--khaki:#b8a888;--khaki-d:#8a7a5a;--linen:#efece4;
--ok:#2e7d32;--warn:#b45309;--err:#c62828;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Noto Sans TC',sans-serif}
body{background:var(--bg);color:var(--txt);padding-bottom:90px}
.hdr{background:#1a1a1a;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr a{color:#b8a888;text-decoration:none;font-size:13px;min-height:44px;display:flex;align-items:center}
.hdr h1{font-size:15px;font-weight:700;flex:1}
.wrap{max-width:1080px;margin:0 auto;padding:14px}
.drop{border:2px dashed var(--khaki);border-radius:var(--r);background:var(--linen);
padding:24px 14px;text-align:center;cursor:pointer;margin-bottom:12px}
.drop.on{background:#e8e2d2;border-color:var(--khaki-d)}
.drop .t1{font-size:14px;font-weight:700;color:var(--txt2)}
.drop .t2{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6}
.btn{min-height:44px;padding:9px 15px;border:none;border-radius:9px;font-size:13px;font-weight:700;
cursor:pointer;background:var(--linen);color:var(--txt2)}
.btn-p{background:#1a1a1a;color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
.cnt{font-size:12px;color:var(--muted)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:12px}
.pttl{font-size:13px;font-weight:700;margin-bottom:9px;color:var(--khaki-d)}
.ai{font-size:12px;line-height:1.9;color:var(--txt2)}
.ai b{color:var(--txt)}
.ai .hot{color:var(--err);font-weight:700}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto;margin-bottom:12px}
table{border-collapse:collapse;width:100%;min-width:860px}
th{background:var(--linen);font-size:11px;font-weight:700;color:var(--txt2);padding:8px;text-align:left;
border-bottom:1px solid var(--border);white-space:nowrap}
td{font-size:12px;padding:7px 8px;border-bottom:1px solid #eee}
tr.skip{opacity:.4}
tr.bad td{background:#fdf3e8}
td input[type=checkbox]{width:19px;height:19px;accent-color:var(--khaki-d)}
.warnc{font-size:10px;color:var(--warn);font-weight:700}
.del{min-width:40px;min-height:34px;border:none;border-radius:8px;background:#fde8e8;color:var(--err);font-weight:700;cursor:pointer;font-size:12px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
.pill{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--linen);color:var(--txt2);font-weight:700}
.pill.lost{background:#fde8e8;color:var(--err)}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;
padding:11px 20px;border-radius:99px;font-size:13px;display:none;z-index:99;max-width:90vw}
.foot{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);
padding:10px 14px;display:none;justify-content:center;gap:9px;z-index:50;flex-wrap:wrap}
.foot.on{display:flex}
</style>
</head>
<body>
<div class="hdr">
  <a href="ac_audit_intake_portal_v1.html">←</a>
  <h1>📝 損壞/遺失報告匯入（Excel）</h1>
  <button class="btn" onclick="exportCur()">⬇ 匯出現有報告</button>
</div>
<div class="wrap">
  <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
    <div class="t1">📝 拖入報告清單 Excel，或點此選取</div>
    <div class="t2">欄位：Date/日期、Name/姓名、Dept/部門、EmpID/工號、Type/類型（損壞/遺失 或 damage/lost）、<br>Items/物品（逗號分隔，如 Fan, Chair）、Desc/說明、Loc/地點、Expl/原因、Status/狀態（待審核/已批準/已拒絕）</div>
  </div>
  <input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0]);this.value=''">

  <div id="ai-panel" class="panel" style="display:none">
    <div class="pttl">🤖 智慧解讀</div>
    <div class="ai" id="ai-body"></div>
  </div>

  <div class="bar" id="selbar" style="display:none">
    <button class="btn" onclick="selAll(true)">全選</button>
    <button class="btn" onclick="selAll(false)">全不選</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div id="tbl"></div>
</div>
<div class="foot" id="foot">
  <button class="btn" onclick="clearAll()">清除</button>
  <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)">
    <input type="checkbox" id="tg-on" checked style="width:18px;height:18px;accent-color:var(--khaki-d)">通知 TG
  </label>
  <button class="btn btn-p" id="btn-w" onclick="writeIn()">✓ 確認寫入報告系統</button>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  損壞/遺失報告匯入 v1 · 寫入鍵：vrt_records
//  ⚠ 需搭配 vrt_damage_report_v2.html（v1 用的 window.storage 在
//    GitHub Pages 上無法儲存，v2 已改為 localStorage 同一個鍵）
//  記錄：{id,date,name,dept,empId,items[],other,otherDate,propLost,
//        lostDate,desc,loc,expl,status,type,photos[],createdAt}
//  ⚠ 匯入前請關閉報告系統頁面
// ══════════════════════════════════════════════════════════════
const GAS_URL='https://script.google.com/macros/s/AKfycbxOXfNmyfqZI6f9Uc__hxcmuiQt-QowkULw23GggAKM6nZ1mQ8DcOx5rwxa7d0obpIf/exec';
const REC_KEY='vrt_records';

const KNOWN_ITEMS=['Fan','Table','Chair','Machine','Seal','Emergency Light','First Aid Kit','Iron','Iron Board','Door',
'Window','Fire Extinguisher','Computer','Air Conditioner','Pad Lock','Fabric','Forklift','Vehicle','Walkie-Talkie','Drawers'];

const MAP={
  date:['date','日期','報告日期'],
  name:['name','姓名','員工姓名','報告人'],
  dept:['dept','department','部門'],
  empId:['empid','emp id','id','工號','員工編號'],
  type:['type','類型','報告類型'],
  items:['items','item','物品','項目'],
  desc:['desc','description','說明','描述','損壞說明'],
  loc:['loc','location','地點','位置'],
  expl:['expl','explanation','原因','原因說明'],
  status:['status','狀態','審核狀態']
};
const ST_ZH={pending:'待審核',approved:'已批準',rejected:'已拒絕'};

let rows=[];

function normType(s){
  const v=String(s||'').trim().toLowerCase();
  if(['lost','遺失','丟失','loss'].includes(v))return'lost';
  return'damage';
}
function normStatus(s){
  const v=String(s||'').trim().toLowerCase();
  if(['approved','已批準','已批准','批準','批准','核准'].includes(v))return'approved';
  if(['rejected','已拒絕','拒絕','駁回'].includes(v))return'rejected';
  return'pending';
}
function serialToDate(n){
  const d=new Date(Date.UTC(1899,11,30)+Math.round(n)*86400000);
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
}
function normDate(v){
  if(v==null||v==='')return'';
  if(typeof v==='number'&&v>20000&&v<80000)return serialToDate(v);
  const s=String(v).trim();
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  return'';
}
function splitItems(s){
  const tokens=String(s||'').split(/[,，、;；]/).map(t=>t.trim()).filter(Boolean);
  const items=[],other=[];
  tokens.forEach(t=>{
    const hit=KNOWN_ITEMS.find(k=>k.toLowerCase()===t.toLowerCase());
    if(hit)items.push(hit);else other.push(t);
  });
  return{items,other:other.join(', ')};
}
function loadRecords(){
  try{const raw=localStorage.getItem(REC_KEY);if(raw)return JSON.parse(raw)||[];}catch(e){}
  return[];
}
function localISO(){
  const d=new Date();const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
function genRecId(){
  const now=new Date();
  return'VRT-'+now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'-'+Math.floor(Math.random()*9000+1000);
}

function handleFile(f){
  if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false,raw:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      parseAoa(aoa);
    }catch(err){toast('讀取失敗：'+err.message);}
  };
  rd.readAsArrayBuffer(f);
}

function parseAoa(aoa){
  let hi=-1,colMap={};
  for(let i=0;i<Math.min(10,aoa.length);i++){
    const cells=(aoa[i]||[]).map(c=>String(c).trim().toLowerCase());
    const cm={};
    Object.entries(MAP).forEach(([field,aliases])=>{
      const ci=cells.findIndex(c=>c&&aliases.includes(c));
      if(ci>-1)cm[field]=ci;
    });
    if(cm.name!=null&&cm.date!=null){hi=i;colMap=cm;break;}
  }
  if(hi<0){toast('找不到標題列（至少需含 Name/姓名 與 Date/日期）');return;}

  const existing=loadRecords();
  const exKeys=new Set(existing.map(r=>(r.date||'')+'|'+(r.name||'').toLowerCase()+'|'+(r.desc||'').toLowerCase().slice(0,30)));

  rows=[];
  for(let i=hi+1;i<aoa.length;i++){
    const r=aoa[i]||[];
    const get=f=>colMap[f]!=null?String(r[colMap[f]]==null?'':r[colMap[f]]).trim():'';
    const name=get('name');
    if(!name)continue;
    const date=normDate(colMap.date!=null?r[colMap.date]:'');
    const warn=[];
    if(!date)warn.push('日期無法解析');
    const desc=get('desc');
    const dup=date&&exKeys.has(date+'|'+name.toLowerCase()+'|'+desc.toLowerCase().slice(0,30));
    if(dup)warn.push('疑似重複');
    const si=splitItems(get('items'));
    rows.push({sel:!warn.length,warn:warn.join('、'),dup,
      date,name,dept:get('dept'),empId:get('empId'),
      type:normType(get('type')),items:si.items,other:si.other,
      desc,loc:get('loc'),expl:get('expl'),status:normStatus(get('status'))});
  }
  if(!rows.length){toast('沒有解析到任何資料列');return;}
  render();renderAI();
}

function renderAI(){
  const el=document.getElementById('ai-panel'),body=document.getElementById('ai-body');
  if(!rows.length){el.style.display='none';return;}
  el.style.display='block';
  const dmg=rows.filter(r=>r.type==='damage').length;
  const lost=rows.filter(r=>r.type==='lost').length;
  const byDept={};rows.forEach(r=>{if(r.dept)byDept[r.dept]=(byDept[r.dept]||0)+1;});
  const byItem={};rows.forEach(r=>{r.items.forEach(it=>{byItem[it]=(byItem[it]||0)+1;});});
  const topItems=Object.entries(byItem).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const pend=rows.filter(r=>r.status==='pending').length;
  let h='共解析 <b>'+rows.length+'</b> 筆報告：損壞 <b>'+dmg+'</b> 筆、'+
    (lost?'<span class="hot">遺失 '+lost+' 筆</span>':'遺失 0 筆')+'。<br>';
  if(Object.keys(byDept).length)h+='部門分布：'+Object.entries(byDept).sort((a,b)=>b[1]-a[1]).map(([k,v])=>k+' '+v+'筆').join('、')+'。<br>';
  if(topItems.length)h+='最常見物品：'+topItems.map(([k,v])=>k+'×'+v).join('、')+'。';
  if(topItems.length&&topItems[0][1]>=3)h+='<span style="color:var(--warn)">（'+topItems[0][0]+' 重複出現 '+topItems[0][1]+' 次，建議查是否有系統性問題）</span>';
  h+='<br>待審核 <b>'+pend+'</b> 筆。';
  const bad=rows.filter(r=>r.warn&&!r.dup).length;
  const dups=rows.filter(r=>r.dup).length;
  if(bad)h+='<br><span class="hot">⚠ '+bad+' 筆有欄位問題（標橘，預設不匯入）。</span>';
  if(dups)h+='<br><span style="color:var(--warn)">⚠ '+dups+' 筆與既有報告疑似重複，預設不匯入。</span>';
  body.innerHTML=h;
}

function render(){
  const el=document.getElementById('tbl');
  if(!rows.length){el.innerHTML='<div class="empty">尚未載入檔案</div>';
    document.getElementById('selbar').style.display='none';
    document.getElementById('foot').classList.remove('on');return;}
  document.getElementById('selbar').style.display='flex';
  document.getElementById('foot').classList.add('on');
  el.innerHTML='<div class="twrap"><table><thead><tr>'+
    '<th></th><th>日期</th><th>姓名</th><th>部門</th><th>工號</th><th>類型</th><th>物品</th><th>說明</th><th>地點</th><th>狀態</th><th>警告</th><th></th>'+
    '</tr></thead><tbody>'+
    rows.map((r,i)=>'<tr class="'+(r.sel?'':'skip ')+(r.warn&&!r.dup?'bad':'')+'">'+
      '<td><input type="checkbox" '+(r.sel?'checked':'')+' onchange="rows['+i+'].sel=this.checked;render()"></td>'+
      '<td>'+esc(r.date||'—')+'</td><td>'+esc(r.name)+'</td><td>'+esc(r.dept)+'</td><td>'+esc(r.empId)+'</td>'+
      '<td><span class="pill'+(r.type==='lost'?' lost':'')+'">'+(r.type==='lost'?'遺失':'損壞')+'</span></td>'+
      '<td>'+esc([...r.items,r.other].filter(Boolean).join(', '))+'</td>'+
      '<td>'+esc(r.desc)+'</td><td>'+esc(r.loc)+'</td><td>'+ST_ZH[r.status]+'</td>'+
      '<td class="warnc">'+esc(r.warn||'')+'</td>'+
      '<td><button class="del" onclick="rows.splice('+i+',1);render();renderAI()">刪</button></td></tr>').join('')+
    '</tbody></table></div>';
  const n=rows.filter(x=>x.sel).length;
  document.getElementById('cnt').textContent='已勾選 '+n+' / '+rows.length+' 筆';
  document.getElementById('btn-w').disabled=!n;
}
function selAll(v){rows.forEach(x=>{if(x.date)x.sel=v;});render();}
function clearAll(){rows=[];render();renderAI();}

let writing=false;
function writeIn(){
  if(writing)return;
  const picked=rows.filter(x=>x.sel&&x.date);
  if(!picked.length){toast('勾選的記錄需有有效日期');return;}
  writing=true;document.getElementById('btn-w').disabled=true;
  const records=loadRecords();
  const stamp=localISO();
  picked.forEach(r=>{
    records.unshift({id:genRecId(),date:r.date,name:r.name,dept:r.dept,empId:r.empId,
      items:r.items,other:r.other,otherDate:'',
      propLost:r.type==='lost',lostDate:r.type==='lost'?r.date:'',
      desc:r.desc,loc:r.loc,expl:r.expl,status:r.status,type:r.type,
      photos:[],createdAt:stamp});
  });
  try{localStorage.setItem(REC_KEY,JSON.stringify(records));}
  catch(e){toast('寫入失敗：'+e.message);writing=false;return;}
  toast('✓ 已寫入 '+picked.length+' 筆報告');
  if(document.getElementById('tg-on').checked){
    const dmg=picked.filter(r=>r.type==='damage').length;
    const lost=picked.filter(r=>r.type==='lost').length;
    const lines=['本次匯入 '+picked.length+' 筆報告（損壞 '+dmg+'、遺失 '+lost+'）'];
    picked.slice(0,10).forEach(r=>{
      lines.push('• '+r.date+' '+r.name+'｜'+(r.type==='lost'?'遺失':'損壞')+'｜'+([...r.items,r.other].filter(Boolean).join(', ')||r.desc.slice(0,30)));});
    if(picked.length>10)lines.push('… 其餘 '+(picked.length-10)+' 筆');
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'tg',title:'損壞/遺失報告匯入',lines})})
      .then(r=>r.json()).then(d=>{if(d.ok)toast('✓ 已寫入並通知 Telegram');})
      .catch(()=>{});
  }
  rows=[];writing=false;render();renderAI();
}

function exportCur(){
  const records=loadRecords();
  if(!records.length){toast('目前無報告記錄');return;}
  const rowsX=records.map((r,i)=>[i+1,r.id,r.date,r.name,r.dept,r.empId,
    r.type==='lost'?'遺失':'損壞',[...(r.items||[]),r.other].filter(Boolean).join(', '),
    r.desc,r.loc,r.expl,ST_ZH[r.status]||r.status]);
  const ws=XLSX.utils.aoa_to_sheet([['No','ID','Date','Name','Dept','EmpID','Type','Items','Desc','Loc','Expl','Status'],...rowsX]);
  ws['!cols']=[{wch:5},{wch:16},{wch:11},{wch:14},{wch:12},{wch:10},{wch:7},{wch:24},{wch:30},{wch:14},{wch:24},{wch:9}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'報告');
  const d=new Date();
  const stamp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  XLSX.writeFile(wb,'VRT_損壞遺失報告_'+stamp+'.xlsx');
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._x);t._x=setTimeout(()=>t.style.display='none',2800);
}
const dz=document.getElementById('drop');
['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('on');}));
['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('on');}));
dz.addEventListener('drop',ev=>handleFile(ev.dataTransfer.files[0]));

window.handleFile=handleFile;window.selAll=selAll;window.clearAll=clearAll;
window.writeIn=writeIn;window.exportCur=exportCur;window.render=render;window.renderAI=renderAI;
render();
</script>
</body>
<!-- ac_audit_intake_damage_v1.html · v1.0 · 2026-07-11 · 寫入鍵 vrt_records（需搭配 vrt_damage_report_v2） -->
