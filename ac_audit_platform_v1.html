<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC Audit Platform | VRT Admin Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --black:#111214; --graphite:#26282C; --graphite2:#33363B; --white:#FFFFFF;
  --khaki:#A89272; --khaki-d:#8C7657; --linen:#F5F1E8; --line:#E5DFD2;
  --ink:#22242A; --ink2:#6B6E76;
  --ok:#4E7A5A; --warn:#C7962E; --danger:#B0492F; --info:#5A7A9A; --crit:#7A2E4A;
  --card-r:10px;
}
[data-theme="dark"]{
  --linen:#1A1C1F; --white:#26282C; --line:#3A3D42; --ink:#ECE8DE; --ink2:#9A9DA5;
  --graphite:#111214; --graphite2:#26282C;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Noto Sans TC','Noto Sans Khmer','Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--linen);color:var(--ink);font-size:14px;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--white);
  border:1px solid var(--line);border-radius:7px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--khaki);box-shadow:0 0 0 2px rgba(168,146,114,.18)}
textarea{resize:vertical;min-height:70px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--khaki);border-radius:5px;opacity:.5}
::-webkit-scrollbar-track{background:transparent}

/* ===== Layout ===== */
#app{display:flex;flex-direction:column;height:100vh}
header{background:var(--white);color:var(--ink);height:54px;display:flex;align-items:center;
  padding:0 16px;gap:10px;border-bottom:1px solid var(--line);flex-shrink:0;z-index:50}
#burger{display:none}
.logo{display:flex;align-items:baseline;gap:8px;white-space:nowrap}
.logo b{font-size:16px;letter-spacing:.14em;color:var(--ink)}
.logo span{font-size:10.5px;letter-spacing:.22em;color:var(--khaki-d)}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hpill{display:flex;align-items:center;gap:6px;background:var(--linen);
  border:1px solid var(--line);color:var(--ink2);font-size:11.5px;
  padding:4px 10px;border-radius:20px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#B9BCC2;display:inline-block;flex-shrink:0}
.dot.ok{background:#6FBF87}.dot.bad{background:#E06A4E}.dot.wait{background:#D9B25C}
.hbtn{background:var(--white);border:1px solid var(--line);color:var(--ink);
  border-radius:7px;padding:6px 11px;font-size:12.5px}
.hbtn:hover{background:var(--khaki);border-color:var(--khaki);color:#fff}
select.hsel{width:auto;background:var(--white);color:var(--ink);border:1px solid var(--line);
  padding:5px 8px;font-size:12.5px;border-radius:7px}
select.hsel option{color:#111}

#body{display:flex;flex-direction:column;flex:1;overflow:hidden}
#tabs{display:flex;gap:2px;background:var(--white);border-bottom:1px solid var(--line);
  padding:0 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;gap:7px;padding:11px 15px 9px;color:var(--ink2);
  text-decoration:none;font-size:13.5px;white-space:nowrap;border-bottom:2.5px solid transparent;cursor:pointer;user-select:none}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--khaki);font-weight:600}
.tab .cnt{font-size:10.5px;background:var(--linen);color:var(--khaki-d);
  padding:1px 7px;border-radius:10px;font-variant-numeric:tabular-nums}
#subtabs{display:flex;gap:4px;background:var(--linen);border-bottom:1px solid var(--line);
  padding:0 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#subtabs.hide{display:none}
#subtabs::-webkit-scrollbar{height:0}
.subtab{padding:8px 14px;font-size:12.5px;color:var(--ink2);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;user-select:none}
.subtab:hover{color:var(--ink)}
.subtab.active{color:var(--khaki-d);border-bottom-color:var(--khaki);font-weight:600}
main{flex:1;overflow-y:auto;padding:20px 22px}

/* ===== Cards / dashboard ===== */
.pgtitle{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pgtitle h2{font-size:19px;font-weight:700;letter-spacing:.02em}
.pgtitle .sub{color:var(--ink2);font-size:12.5px}
.grid{display:grid;gap:12px}
.g-kpi{grid-template-columns:repeat(auto-fill,minmax(158px,1fr))}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--card-r);padding:14px 16px;position:relative;overflow:hidden}
.kpi{cursor:pointer}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kc,var(--khaki))}
.kpi .kv{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
.kpi .kl{font-size:11.5px;color:var(--ink2);margin-top:3px;line-height:1.35}
.kpi .kico{position:absolute;right:12px;top:10px;font-size:17px;opacity:.5}
.panel{background:var(--white);border:1px solid var(--line);border-radius:var(--card-r);padding:16px}
.panel h3{font-size:13px;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel h3 .rule{flex:1;height:1px;background:var(--line)}

/* ===== Toolbar / table ===== */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input[type=search]{width:220px}
.toolbar select{width:auto}
.btn{border:1px solid var(--line);background:var(--white);color:var(--ink);border-radius:7px;
  padding:8px 13px;font-size:13px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{border-color:var(--khaki);color:var(--khaki-d)}
.btn.pri{background:var(--black);color:#fff;border-color:var(--black)}
.btn.pri:hover{background:var(--khaki);border-color:var(--khaki);color:#111}
.btn.ghost{background:transparent}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.dng{color:var(--danger);border-color:var(--danger)}
.dd{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--white);
  border:1px solid var(--line);border-radius:8px;min-width:170px;z-index:60;box-shadow:0 8px 24px rgba(17,18,20,.12);overflow:hidden}
.dd.open .dd-menu{display:block}
.dd-menu button{display:block;width:100%;text-align:left;background:none;border:none;
  padding:9px 14px;font-size:13px;color:var(--ink)}
.dd-menu button:hover{background:var(--linen);color:var(--khaki-d)}
.tblwrap{background:var(--white);border:1px solid var(--line);border-radius:var(--card-r);overflow:auto}
table.dt{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
table.dt th{background:var(--graphite);color:#D8D4C8;text-align:left;padding:9px 12px;font-weight:600;
  font-size:11.5px;letter-spacing:.05em;white-space:nowrap;position:sticky;top:0}
table.dt td{padding:9px 12px;border-top:1px solid var(--line);vertical-align:top}
table.dt tbody tr:hover{background:rgba(168,146,114,.07);cursor:pointer}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;
  color:#fff;background:var(--ink2);white-space:nowrap}
.b-ok{background:var(--ok)}.b-warn{background:var(--warn)}.b-danger{background:var(--danger)}
.b-info{background:var(--info)}.b-crit{background:var(--crit)}.b-mute{background:#8A8D95}
.empty{padding:40px;text-align:center;color:var(--ink2)}
.empty .e1{font-size:30px;margin-bottom:8px;opacity:.5}

/* ===== Modal ===== */
.mask{display:none;position:fixed;inset:0;background:rgba(17,18,20,.55);z-index:100;
  align-items:flex-start;justify-content:center;padding:4vh 14px;overflow-y:auto}
.mask.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:760px;
  border-top:3px solid var(--khaki);animation:pop .16s ease}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.m-head{display:flex;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line)}
.m-head h3{font-size:15.5px}
.m-head .x{margin-left:auto;background:none;border:none;font-size:19px;color:var(--ink2);padding:2px 8px}
.m-body{padding:18px 20px;max-height:66vh;overflow-y:auto}
.m-foot{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
.f-full{grid-column:1/-1}
.fld label{display:block;font-size:11.5px;color:var(--ink2);margin-bottom:4px;letter-spacing:.03em}
.fld label .req{color:var(--danger)}
.photos{display:flex;gap:8px;flex-wrap:wrap}
.photos .ph{width:74px;height:74px;border-radius:8px;border:1px solid var(--line);position:relative;
  background-size:cover;background-position:center}
.photos .ph .rm{position:absolute;top:-6px;right:-6px;width:19px;height:19px;border-radius:50%;
  background:var(--danger);color:#fff;border:none;font-size:11px;line-height:1}
.photos .add{width:74px;height:74px;border:1.5px dashed var(--khaki);border-radius:8px;background:none;
  color:var(--khaki);font-size:22px}

/* ===== Misc ===== */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid var(--line);background:var(--white);border-radius:16px;padding:5px 13px;font-size:12.5px;color:var(--ink2)}
.chip.on{background:var(--black);color:#fff;border-color:var(--black)}
.actlist{list-style:none;max-height:330px;overflow-y:auto}
.actlist li{padding:8px 2px;border-bottom:1px dashed var(--line);font-size:12.5px;display:flex;gap:8px}
.actlist li time{color:var(--ink2);font-size:11px;white-space:nowrap;font-variant-numeric:tabular-nums}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;
  padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;display:none;border-left:3px solid var(--khaki);
  box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:86vw}
.chartbox{position:relative;height:250px}
.g-charts{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.subtabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.subtabs button{background:none;border:none;padding:9px 15px;font-size:13px;color:var(--ink2);
  border-bottom:2px solid transparent;margin-bottom:-2px}
.subtabs button.on{color:var(--ink);border-bottom-color:var(--khaki);font-weight:600}
.hint{font-size:11.5px;color:var(--ink2);line-height:1.6}
.kv-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.kv-row b{font-variant-numeric:tabular-nums}
.setsec{margin-bottom:22px}
.setsec h4{font-size:13px;margin-bottom:10px;color:var(--khaki-d);letter-spacing:.06em}
.swrow{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px}
.swrow input[type=checkbox]{width:auto;transform:scale(1.15)}
.typechip{display:inline-flex;align-items:center;gap:7px;background:var(--linen);border:1px solid var(--line);
  border-radius:16px;padding:5px 12px;font-size:12.5px;margin:0 6px 6px 0}
.typechip button{background:none;border:none;color:var(--danger);font-size:13px;padding:0}
@media print{
  header,nav,.toolbar,.m-foot,#toast{display:none!important}
  main{padding:0;overflow:visible}body{overflow:visible}
  .tblwrap{border:none}table.dt th{position:static;background:#eee;color:#111}
}
@media(max-width:900px){
  .tab{padding:10px 12px 8px;font-size:13px}
  .hpill .plabel{display:none}
  main{padding:14px}
  .fgrid{grid-template-columns:1fr}
  .toolbar input[type=search]{width:100%}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo"><b>AC AUDIT</b><span>PLATFORM · VRT</span></div>
  <div id="hdr-right">
    <div class="hpill" id="pill-cloud" title="Cloud"><span class="dot" id="dot-cloud"></span><span class="plabel" id="lbl-cloud">Cloud</span></div>
    <div class="hpill" id="pill-tg" title="Telegram"><span class="dot" id="dot-tg"></span><span class="plabel">TG</span></div>
    <button class="hbtn" onclick="cloudUpload()" title="Upload">☁⬆</button>
    <button class="hbtn" onclick="cloudDownload()" title="Download">☁⬇</button>
    <button class="hbtn" onclick="cloudSync()" title="Sync">⟳</button>
    <select class="hsel" id="langSel" onchange="setLang(this.value)">
      <option value="zh">中文</option><option value="en">EN</option><option value="km">ខ្មែរ</option>
    </select>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">◐</button>
  </div>
</header>
<div id="body">
  <div id="tabs"></div>
  <div id="subtabs" class="hide"></div>
  <main id="main"></main>
</div>
</div>

<div class="mask" id="modalMask"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>
<input type="file" id="xlsxFile" accept=".xlsx,.xls,.csv" style="display:none">
<input type="file" id="jsonFile" accept=".json" style="display:none">
<input type="file" id="photoFile" accept="image/*" multiple style="display:none">
<input type="file" id="msgFile" accept=".msg,.eml,.txt" style="display:none">
<input type="file" id="impFile" accept=".xlsx,.xls,.csv,.msg,.eml,.txt,.json" multiple style="display:none">

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
function pad(n){return n<10?'0'+n:''+n}
function fmtDate(d){d=d instanceof Date?d:new Date(d);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function fmtDT(d){d=d instanceof Date?d:new Date(d);return fmtDate(d)+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function todayStr(){return fmtDate(new Date())}
function daysDiff(dateStr){if(!dateStr)return null;const a=new Date(dateStr+'T00:00:00'),b=new Date(todayStr()+'T00:00:00');return Math.round((a-b)/86400000)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,ms){const el=$('#toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',ms||2600)}
function uid(prefix){
  const d=new Date(),ds=''+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  DB.meta.seq=DB.meta.seq||{};const key=prefix+'-'+ds;
  DB.meta.seq[key]=(DB.meta.seq[key]||0)+1;
  return key+'-'+String(DB.meta.seq[key]).padStart(4,'0');
}

const DEFAULT_TYPES=['Internal','Customer','GRS','WRAP','SLCP','HIGG FEM','ISO 9001','ISO 14001','BSCI','SEDEX','Social','C-TPAT'];
let DB=loadDB();
function loadDB(){
  try{const d=JSON.parse(localStorage.getItem(DB_KEY));if(d&&d.meta)return migrate(d)}catch(e){}
  return {meta:{version:1,updatedAt:Date.now(),lastSync:0,seq:{}},
    settings:{auditTypes:DEFAULT_TYPES.slice()},
    audits:[],caps:[],grs_certs:[],grs_tc:[],grs_suppliers:[],grs_trace:[],
    documents:[],incidents:[],policies:[],msg:[],training:[],activities:[]};
}
function migrate(d){
  ['audits','caps','grs_certs','grs_tc','grs_suppliers','grs_trace','documents','incidents','policies','msg','training','activities'].forEach(k=>{if(!Array.isArray(d[k]))d[k]=[]});
  d.settings=d.settings||{};if(!Array.isArray(d.settings.auditTypes)||!d.settings.auditTypes.length)d.settings.auditTypes=DEFAULT_TYPES.slice();
  d.meta.seq=d.meta.seq||{};return d;
}
function saveDB(touch){
  if(touch!==false)DB.meta.updatedAt=Date.now();
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
  renderNavCounts();
}
function logAct(text){
  DB.activities.unshift({t:Date.now(),x:text});
  if(DB.activities.length>200)DB.activities.length=200;
}

===================================================================== */
let CURRENT='dashboard', GRS_CUR='grs_certs';
const GRS_SUBS=['grs_certs','grs_tc','grs_suppliers','grs_trace'];
const TAB_ORDER=['dashboard','analytics','audits','caps','grs','documents','incidents','policies','training','msg','imp','settings'];
const PAGE_ICONS={dashboard:'◧',analytics:'📈',settings:'⚙',grs:'🏅',imp:'📥'};
const SUBSYS_LINKS=[
 {u:'VRT_Factory_Rules_v2.html',i:'📕',zh:'廠規手冊',en:'Factory Rules'},
 {u:'cambodia_law_v1.html',i:'⚖️',zh:'柬埔寨法律參考',en:'Cambodia Law'}];
function tabLabel(k){
  if(k==='grs')return 'GRS';
  return t(k);
}
function renderNav(){   // 上方 Tabs
  let h='';
  TAB_ORDER.forEach(k=>{
    const ico=MODULES[k]?MODULES[k].icon:(PAGE_ICONS[k]||'•');
    const on=(CURRENT===k)||(k==='grs'&&GRS_SUBS.includes(CURRENT));
    const cnt=(k!=='grs'&&MODULES[k])?'<span class="cnt" id="cnt-'+k+'"></span>':'';
    h+='<div class="tab '+(on?'active':'')+'" data-k="'+k+'" onclick="go(\''+k+'\')">'+
       '<span>'+ico+'</span><span>'+esc(tabLabel(k))+'</span>'+cnt+'</div>';
  });
  $('#tabs').innerHTML=h;renderNavCounts();
}
function renderNavCounts(){
  MODULE_KEYS.forEach(k=>{const el=$('#cnt-'+k);if(el)el.textContent=DB[k]&&DB[k].length||''});
}
function markTabs(){
  $$('#tabs .tab').forEach(a=>{const k=a.dataset.k;
    a.classList.toggle('active',(CURRENT===k)||(k==='grs'&&GRS_SUBS.includes(CURRENT)))});
}
function renderGrsSubtabs(){
  const st=$('#subtabs');st.classList.remove('hide');
  st.innerHTML=GRS_SUBS.map(s=>'<div class="subtab '+(GRS_CUR===s?'active':'')+
    '" onclick="goGrs(\''+s+'\')">'+esc(MODULES[s].icon+' '+t(s))+'</div>').join('');
}
function goGrs(sub){
  GRS_CUR=sub;CURRENT=sub;location.hash=sub;
  renderGrsSubtabs();markTabs();
  const m=$('#main');if(m)m.scrollTop=0;
  renderModule(sub);
}
function go(k){
  if(k==='grs')return goGrs(GRS_CUR);
  if(GRS_SUBS.includes(k))return goGrs(k);
  CURRENT=k;location.hash=k;
  $('#subtabs').classList.add('hide');
  markTabs();
  const m=$('#main');if(m)m.scrollTop=0;
  if(k==='dashboard')return renderDashboard();
  if(k==='analytics')return renderAnalytics();
  if(k==='settings')return renderSettings();
  if(k==='imp')return renderImport();
  if(MODULES[k])return renderModule(k);
  renderDashboard();
}

/* =====================================================================
   GENERIC MODULE ENGINE  (table / search / filter / CRUD / io / cloud)
===================================================================== */
let SEARCHQ='',FILTERV='';
function optList(name){return typeof name==='string'?OPT[name]:name}
function optLabel(name,v){const o=(optList(name)||[]).find(x=>x.v===v);return o?L(o.L):(v||'')}
function optBadge(name,v){const o=(optList(name)||[]).find(x=>x.v===v);
  return o?'<span class="badge '+(o.c||'b-mute')+'">'+esc(L(o.L))+'</span>':esc(v||'')}
function expiryBadge(dateStr){
  if(!dateStr)return '';const d=daysDiff(dateStr);
  if(d<0)return '<span class="badge b-danger">'+(LANG==='zh'?'過期 ':'')+d+'d</span>';
  if(d<=30)return '<span class="badge b-warn">'+d+'d</span>';
  if(d<=60)return '<span class="badge b-info">'+d+'d</span>';
  return '<span class="badge b-ok">'+d+'d</span>';
}
function fieldOf(mod,k){return MODULES[mod].fields.find(f=>f.k===k)}
function cellVal(mod,rec,col){
  if(col==='id')return '<b style="font-variant-numeric:tabular-nums">'+esc(rec.id)+'</b>';
  if(col==='_expiry')return expiryBadge(rec.expiryDate);
  const f=fieldOf(mod,col);if(!f)return esc(rec[col]);
  if(f.t==='select')return optBadge(f.opts,rec[col]);
  if(f.t==='dynselect')return esc(rec[col]||'');
  if(f.t==='refselect'){const r=(DB[f.ref]||[]).find(x=>x.id===rec[col]);return esc(r?(r[f.refLabel]||r.id):(rec[col]||''))}
  if(f.t==='textarea'){const s=String(rec[col]||'');return esc(s.length>60?s.slice(0,60)+'…':s)}
  return esc(rec[col]==null?'':rec[col]);
}
function colHead(mod,col){
  if(col==='id')return 'ID';
  if(col==='_expiry')return LANG==='zh'?'剩餘天數':(LANG==='km'?'ថ្ងៃនៅសល់':'Days Left');
  const f=fieldOf(mod,col);return f?L(f.L):col;
}
function moduleRows(k){
  const M=MODULES[k];let rows=DB[k].slice();
  if(FILTERV&&M.filter)rows=rows.filter(r=>r[M.filter]===FILTERV);
  if(SEARCHQ){const q=SEARCHQ.toLowerCase();
    rows=rows.filter(r=>Object.keys(r).some(kk=>kk!=='photos'&&String(r[kk]||'').toLowerCase().includes(q)))}
  rows.sort((a,b)=>(b._updated||0)-(a._updated||0));return rows;
}
function renderModule(k){
  SEARCHQ='';FILTERV='';
  const M=MODULES[k];
  let filterSel='';
  if(M.filter){const f=fieldOf(k,M.filter);
    filterSel='<select onchange="FILTERV=this.value;drawTable(\''+k+'\')"><option value="">'+esc(t('all'))+' - '+esc(L(f.L))+'</option>'+
      (optList(f.opts)||[]).map(o=>'<option value="'+esc(o.v)+'">'+esc(L(o.L))+'</option>').join('')+'</select>';}
  $('#main').innerHTML=
   '<div class="pgtitle"><h2>'+M.icon+' '+esc(t(k))+'</h2><span class="sub" id="modCount"></span></div>'+
   '<div class="toolbar">'+
    '<button class="btn pri" onclick="openForm(\''+k+'\')">＋ '+esc(t('add'))+'</button>'+
    '<input type="search" placeholder="'+esc(t('search'))+'" oninput="SEARCHQ=this.value;drawTable(\''+k+'\')">'+filterSel+
    '<span style="flex:1"></span>'+

  const g=$('#photoGrid');if(!g)return;
  g.innerHTML=FORM_PHOTOS.map((p,i)=>'<div class="ph" style="background-image:url('+p+')" onclick="viewPhoto('+i+')">'+
    '<button class="rm" onclick="event.stopPropagation();FORM_PHOTOS.splice('+i+',1);drawPhotoGrid()">✕</button></div>').join('')+

function viewPhoto(i){const w=window.open('');w.document.write('<img src="'+FORM_PHOTOS[i]+'" style="max-width:100%">')}
function pickPhotos(){$('#photoFile').onchange=async e=>{
  for(const f of e.target.files){FORM_PHOTOS.push(await compressImage(f))}
  e.target.value='';drawPhotoGrid();
};$('#photoFile').click()}
function compressImage(file){return new Promise(res=>{
  const img=new Image(),fr=new FileReader();
  fr.onload=()=>{img.onload=()=>{
    const MAX=900,r=Math.min(1,MAX/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=img.width*r;c.height=img.height*r;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    res(c.toDataURL('image/jpeg',0.62));
  };img.src=fr.result};fr.readAsDataURL(file);
})}
function closeModal(){$('#modalMask').classList.remove('show')}
$('#modalMask').addEventListener('click',e=>{if(e.target.id==='modalMask')closeModal()});

function saveForm(k,id){
  const M=MODULES[k];
  const rec=id?DB[k].find(r=>r.id===id):{id:uid(M.prefix),_created:Date.now()};
  for(const f of M.fields){
    if(f.t==='photos'){rec.photos=FORM_PHOTOS.slice();continue}
    const el=$('#f_'+f.k);if(!el)continue;
    let v=el.value.trim();
    if(f.req&&!v){toast(t('reqMiss')+L(f.L));el.focus();return}
    rec[f.k]=f.t==='number'?(v===''?'':Number(v)):v;
  }
  rec._updated=Date.now();
  if(M.onSave)M.onSave(rec,!id);
  if(!id)DB[k].push(rec);
  logAct((id?'✏️':'＋')+' '+t(k)+' · '+rec.id);
  saveDB();closeModal();toast(t('saved')+' · '+rec.id);
  if(CURRENT===k)MODULES[k].custom?go(k):drawTable(k);
  if(!id&&k==='caps'&&(rec.riskLevel==='high'||rec.riskLevel==='critical')&&CFG.notif.hiRisk)
    tgNotify('🔴 <b>High Risk Finding</b>\n'+esc(rec.id)+' · '+esc(rec.department||'')+'\n'+esc((rec.description||'').slice(0,180))+'\nDue: '+esc(rec.dueDate||'-'));
  if(!id&&k==='audits'&&CFG.notif.newAudit)
    tgNotify('📋 <b>New Audit</b>\n'+esc(rec.id)+' · '+esc(rec.auditType||'')+' · '+esc(rec.auditName||'')+'\nDate: '+esc(rec.date||'-'));
  if(!id&&k==='incidents'&&CFG.notif.newIncident)
    tgNotify('🚨 <b>New Incident</b>\n'+esc(rec.id)+' · '+esc(optLabel('incType',rec.type))+'\n'+esc((rec.description||'').slice(0,180)));
}
function delRec(k,id){

  DB[k]=DB[k].filter(r=>r.id!==id);
  logAct('🗑 '+t(k)+' · '+id);saveDB();toast(t('deleted'));drawTable(k);
}

function importExcel(k){
  $('#xlsxFile').onchange=e=>{
    const f=e.target.files[0];if(!f)return;e.target.value='';
    const fr=new FileReader();
    fr.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false,raw:true});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        if(!rows.length)return toast('⚠ Empty sheet');
        const M=MODULES[k];let n=0;
        rows.forEach(row=>{
          const rec={id:'',_created:Date.now(),_updated:Date.now(),photos:[]};
          const keys=Object.keys(row);
          M.fields.forEach(fd=>{
            if(fd.t==='photos')return;
            const hit=keys.find(h=>{const hh=String(h).trim().toLowerCase();
              return hh===fd.k.toLowerCase()||hh===fd.L.en.toLowerCase()||String(h).trim()===fd.L.zh});
            if(hit!=null){let v=row[hit];
              if(fd.t==='date'&&typeof v==='number')v=fmtDate(new Date(Math.round((v-25569)*86400000)));
              rec[fd.k]=fd.t==='number'?(v===''?'':Number(v)):String(v).trim();}
          });
          const idKey=keys.find(h=>String(h).trim().toUpperCase()==='ID');
          rec.id=(idKey&&String(row[idKey]).trim())||uid(M.prefix);
          const ex=DB[k].findIndex(r=>r.id===rec.id);
          if(ex>=0)DB[k][ex]=Object.assign(DB[k][ex],rec,{_updated:Date.now()});else DB[k].push(rec);
          n++;
        });
        logAct('📊 Import Excel · '+t(k)+' × '+n);saveDB();drawTable(k);toast('📊 Import ✓ '+n+' rows');
      }catch(err){toast('⚠ Import error: '+err.message)}
    };
    fr.readAsArrayBuffer(f);
  };$('#xlsxFile').click();
}
function backupJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,1)],{type:'application/json'}));
  a.download='AC_AUDIT_BACKUP_'+todayStr()+'.json';a.click();toast('🗂 Backup ✓');

function restoreJSON(){
  $('#jsonFile').onchange=e=>{
    const f=e.target.files[0];if(!f)return;e.target.value='';
    const fr=new FileReader();
    fr.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(!d.meta)throw new Error('Invalid backup');
      DB=migrate(d);saveDB();logAct('🗂 Restore JSON backup');go(CURRENT);toast('🗂 Restore ✓');
    }catch(err){toast('⚠ '+err.message)}};
    fr.readAsText(f);
  };$('#jsonFile').click();
}

/* =====================================================================
   CLOUD SYNC  (GAS AC_AUDIT_PLATFORM · POST text/plain 避免 CORS preflight)
===================================================================== */
async function gasCall(payload){
  if(!CFG.gasUrl)throw new Error(t('cloudBad'));
  const res=await fetch(CFG.gasUrl,{method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)});
  const j=await res.json();
  if(!j.ok)throw new Error(j.error||'GAS error');
  return j;
}
function setCloudDot(state){const d=$('#dot-cloud');d.className='dot '+(state||'');}
async function pingCloud(){
  if(!CFG.gasUrl){setCloudDot('bad');return}
  setCloudDot('wait');
  try{await gasCall({action:'ping'});setCloudDot('ok');$('#dot-tg').className='dot ok'}
  catch(e){setCloudDot('bad')}
}
async function cloudUpload(){
  try{
    toast('☁⬆ …');setCloudDot('wait');
    await gasCall({action:'upload',data:DB,updatedAt:DB.meta.updatedAt});
    DB.meta.lastSync=Date.now();saveDB(false);setCloudDot('ok');
    logAct('☁⬆ Upload');saveDB(false);toast(t('upDone'));
    if(CFG.notif.upload)tgNotify('☁⬆ <b>AC Audit</b> upload complete · '+esc(fmtDT(new Date())));
    if(CURRENT==='dashboard')renderDashboard();
  }catch(e){setCloudDot('bad');toast('⚠ '+e.message)}
}
async function cloudDownload(quiet){
  try{
    if(!quiet&&!confirm(t('confirmDown')))return;
    toast('☁⬇ …');setCloudDot('wait');
    const j=await gasCall({action:'download'});
    if(!j.data)throw new Error('No cloud data');
    DB=migrate(j.data);DB.meta.lastSync=Date.now();
    saveDB(false);setCloudDot('ok');logAct('☁⬇ Download');saveDB(false);
    go(CURRENT);toast(t('downDone'));
    if(CFG.notif.download)tgNotify('☁⬇ <b>AC Audit</b> download complete · '+esc(fmtDT(new Date())));
  }catch(e){setCloudDot('bad');toast('⚠ '+e.message)}
}
async function cloudSync(){
  try{
    toast(t('syncing'));setCloudDot('wait');
    const j=await gasCall({action:'meta'});
    const remote=j.updatedAt||0;
    if(DB.meta.updatedAt>remote){await cloudUpload();toast(t('syncUp'))}
    else if(remote>DB.meta.updatedAt){await cloudDownload(true);toast(t('syncDown'))}
    else{DB.meta.lastSync=Date.now();saveDB(false);setCloudDot('ok');toast(t('syncSame'))}
    if(CFG.notif.sync)tgNotify('⟳ <b>AC Audit</b> sync complete · '+esc(fmtDT(new Date())));
  }catch(e){setCloudDot('bad');toast('⚠ '+e.message)}
}

/* ---------- Telegram (經 GAS 轉送，parse_mode HTML) ---------- */
async function tgNotify(html){
  try{await gasCall({action:'tg',text:html})}catch(e){/* silent */}
}

function dashStats(){
  const td=todayStr();
  const inDays=(ds,n)=>{const d=daysDiff(ds);return d!=null&&d>=0&&d<=n};
  const capOpen=DB.caps.filter(r=>r.status!=='closed');
  const capOver=capOpen.filter(r=>r.dueDate&&daysDiff(r.dueDate)<0);
  const scores=DB.audits.map(a=>Number(a.score)).filter(n=>!isNaN(n)&&n>0);
  return {
   todayAudit:DB.audits.filter(a=>a.date===td||(a.date<=td&&a.endDate>=td)).length,
   upcoming:DB.audits.filter(a=>inDays(a.date,7)).length,
   capOpen:capOpen.length,capOverdue:capOver.length,
   certExp:DB.grs_certs.filter(r=>inDays(r.expiryDate,60)).concat(DB.grs_suppliers.filter(r=>inDays(r.expiryDate,60))).length,
   docExp:DB.documents.filter(r=>inDays(r.expiryDate,60)).length,
   findings:DB.caps.length,
   hiRisk:DB.caps.filter(r=>(r.riskLevel==='high'||r.riskLevel==='critical')&&r.status!=='closed').length,
   avgScore:scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10:'-',
   grsValid:DB.grs_certs.filter(r=>r.status==='valid').length,
   dccActive:DB.documents.filter(r=>r.status==='active').length,
   incOpen:DB.incidents.filter(r=>r.status!=='closed').length
  };
}

/* Outlook .msg：掃描 CFB 內 UTF-16LE 可讀字串（輕量抽取，不依賴外部庫） */
function extractMsgText(u8){
  let out=[],cur=[];
  for(let i=0;i+1<u8.length;i+=2){
    const code=u8[i]|(u8[i+1]<<8);
    const ok=(code>=32&&code<0xD800)||code===10||code===13||code===9;
    if(ok){cur.push(code);if(cur.length>60000){out.push(String.fromCharCode.apply(null,cur));cur=[]}}
    else{if(cur.length>=8)out.push(String.fromCharCode.apply(null,cur));cur=[]}
  }
  if(cur.length>=8)out.push(String.fromCharCode.apply(null,cur));
  return out.filter(s=>/[A-Za-z\u4e00-\u9fff\u1780-\u17ff]/.test(s))
            .filter(s=>!/^(__substg|__properties|Root Entry|\x05)/.test(s))
            .join('\n').replace(/\n{3,}/g,'\n\n').slice(0,20000);
}

const IMP_TARGETS=['audits','caps','grs_certs','grs_tc','grs_suppliers','grs_trace',
                   'documents','incidents','policies','msg','training'];
/* 依檔名 + 表頭 猜模組 */
const IMP_HINT={
 audits:['audit','稽核','sedex','wrap','slcp','higg','bsci','iso'],
 caps:['cap','capa','car','corrective','finding','矯正','缺失'],
 grs_certs:['grs','scope certificate','證書'],
 grs_tc:['tc','transaction'],

 msg:['msg','email','mail','外來文件','ext'],
 training:['train','培訓','course','課程','教育']
};
function guessTarget(fname,headers){
  const hay=(fname+' '+(headers||[]).join(' ')).toLowerCase();
  let best='',score=0;
  IMP_TARGETS.forEach(k=>{
    let s=0;(IMP_HINT[k]||[]).forEach(w=>{if(hay.indexOf(w)>=0)s+=2});
    // 表頭與模組欄位吻合度
    const M=MODULES[k];(headers||[]).forEach(h=>{const hh=String(h).trim().toLowerCase();
      if(M.fields.some(f=>f.k.toLowerCase()===hh||f.L.en.toLowerCase()===hh||f.L.zh===String(h).trim()))s+=1});
    if(s>score){score=s;best=k}
  });
  return best||'audits';
}

function handleImpFiles(files){
  Array.from(files).forEach(f=>{
    const ext=f.name.toLowerCase().split('.').pop();
    const fr=new FileReader();
    if(ext==='json'){
      fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);
        if(d&&d.meta&&MODULE_KEYS.some(k=>Array.isArray(d[k]))){
          if(!confirm(LANG==='zh'?'這是整庫備份，將覆蓋現有資料。確定？':'Full backup — overwrite all data?'))return;
          DB=migrate(d);saveDB();renderNavCounts();toast('🗂 Restore ✓');go('dashboard');
        }else toast('⚠ 非本平台備份格式');
      }catch(err){toast('⚠ JSON error')}};
      fr.readAsText(f);return;
    }
    if(ext==='msg'||ext==='eml'||ext==='txt'){
      const done=txt=>{
        const grab=re=>{const m=txt.match(re);return m?m[1].trim():''};
        const from=grab(/^From:\s*(.+)$/mi)||grab(/寄件者[:：]\s*(.+)$/mi);
        const subj=grab(/^Subject:\s*(.+)$/mi)||grab(/主旨[:：]\s*(.+)$/mi)||f.name.replace(/\.[^.]+$/,'');
        const dt=grab(/^Date:\s*(.+)$/mi)||grab(/日期[:：]\s*(.+)$/mi);
        let d=todayStr();if(dt){const x=new Date(dt);if(!isNaN(x))d=fmtDate(x)}
        const body=txt.slice(0,8000);
        const urgent=/urgent|緊急|immediate|non-?conformity|不符合|violation|deadline|逾期/i.test(txt);
        IMPQ.push({name:f.name,kind:'msg',target:'msg',
          rows:[{date:d,from:from,subject:subj,msgType:urgent?'issue':'evidence',content:body}],
          analysis:(LANG==='zh'
            ?('📨 郵件解析：寄件人「'+(from||'未偵測')+'」，主旨「'+subj+'」，日期 '+d+'。'+
              (urgent?'⚠ 內文出現「緊急／不符合／逾期」等關鍵字，已標為 issue，建議匯入後直接轉 CAP。':'內文未偵測到緊急關鍵字，歸類為證據。'))
            :('Email parsed: from "'+(from||'n/a')+'", subject "'+subj+'". '+(urgent?'Urgent keywords found → flagged as issue.':'No urgent keywords → evidence.')))});
        drawImpQueue();
      };
      if(ext==='msg'){fr.onload=ev=>done(extractMsgText(new Uint8Array(ev.target.result)));fr.readAsArrayBuffer(f)}
      else{fr.onload=ev=>done(ev.target.result);fr.readAsText(f)}
      return;
    }
    // Excel / CSV
    fr.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false,raw:true});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        if(!rows.length)return toast('⚠ '+f.name+' 沒有資料');
        const headers=Object.keys(rows[0]);
        const tgt=guessTarget(f.name,headers);
        IMPQ.push({name:f.name,kind:'sheet',target:tgt,rows:rows,headers:headers,
                   analysis:analyzeSheet(tgt,rows,headers)});
        drawImpQueue();
      }catch(err){toast('⚠ '+f.name+': '+err.message)}
    };
    fr.readAsArrayBuffer(f);
  });
}
/* 智慧分析：欄位吻合度、日期區間、狀態分布、重複 ID、風險提示 */
function analyzeSheet(tgt,rows,headers){
  const M=MODULES[tgt],out=[];
  const matched=M.fields.filter(fd=>headers.some(h=>{const hh=String(h).trim().toLowerCase();
    return hh===fd.k.toLowerCase()||hh===fd.L.en.toLowerCase()||String(h).trim()===fd.L.zh}));
  const rate=Math.round(matched.length/M.fields.length*100);
  out.push((LANG==='zh'?'📊 共 ':'📊 ')+rows.length+(LANG==='zh'?' 列，欄位吻合度 ':' rows, field match ')+rate+'%（'+matched.length+'/'+M.fields.length+'）');
  const unmatched=headers.filter(h=>!M.fields.some(fd=>{const hh=String(h).trim().toLowerCase();
    return hh===fd.k.toLowerCase()||hh===fd.L.en.toLowerCase()||String(h).trim()===fd.L.zh}));
  if(unmatched.length)out.push((LANG==='zh'?'⚠ 無法對應的欄位（將被忽略）：':'⚠ Unmapped columns (ignored): ')+unmatched.slice(0,8).join('、'));
  // 日期區間
  const dk=(M.fields.find(f=>f.t==='date')||{}).k;
  if(dk){const ds=rows.map(r=>{const h=headers.find(x=>String(x).trim().toLowerCase()===dk.toLowerCase());
      let v=h?r[h]:'';if(typeof v==='number')v=fmtDate(new Date(Math.round((v-25569)*86400000)));
      return String(v).slice(0,10)}).filter(v=>/^\d{4}-\d{2}-\d{2}$/.test(v)).sort();
    if(ds.length)out.push((LANG==='zh'?'📅 日期區間：':'📅 Date range: ')+ds[0]+' → '+ds[ds.length-1]);}
  // 重複 ID
  const idh=headers.find(h=>String(h).trim().toUpperCase()==='ID');
  if(idh){const ids=rows.map(r=>String(r[idh]).trim()).filter(Boolean);
    const dup=ids.filter(x=>DB[tgt].some(r=>r.id===x));
    if(dup.length)out.push((LANG==='zh'?'🔁 其中 ':'🔁 ')+dup.length+(LANG==='zh'?' 筆 ID 已存在，將「更新」而非新增。':' existing IDs will be updated, not added.'));}
  else out.push(LANG==='zh'?'🆕 無 ID 欄，全部視為新增（系統自動編號）。':'🆕 No ID column — all treated as new records.');
  return out.join('\n');
}

function commitImp(i){
  const q=IMPQ[i],k=q.target,M=MODULES[k];let n=0;
  q.rows.forEach(row=>{
    const rec={id:'',_created:Date.now(),_updated:Date.now(),photos:[]};
    const keys=Object.keys(row);
    M.fields.forEach(fd=>{
      if(fd.t==='photos')return;
      const hit=keys.find(h=>{const hh=String(h).trim().toLowerCase();
        return hh===fd.k.toLowerCase()||hh===fd.L.en.toLowerCase()||String(h).trim()===fd.L.zh});
      if(hit!=null){let v=row[hit];
        if(fd.t==='date'&&typeof v==='number')v=fmtDate(new Date(Math.round((v-25569)*86400000)));
        rec[fd.k]=fd.t==='number'?(v===''?'':Number(v)):String(v==null?'':v).trim();}
    });
    const idKey=keys.find(h=>String(h).trim().toUpperCase()==='ID');
    rec.id=(idKey&&String(row[idKey]).trim())||uid(M.prefix);
    const ex=DB[k].findIndex(r=>r.id===rec.id);
    if(ex>=0)DB[k][ex]=Object.assign(DB[k][ex],rec,{_updated:Date.now()});else DB[k].push(rec);
    n++;
  });
  logAct('📥 Import · '+t(k)+' × '+n+' ('+q.name+')');
  DB.meta.updatedAt=Date.now();saveDB();renderNavCounts();
  IMPQ.splice(i,1);drawImpQueue();
  toast('✅ '+t(k)+' ← '+n+' rows');
}

/* ── 舊系統資料遷移（vrt_dcc_v2 / msgProcessor_data）── */
function _nd(s){if(!s)return'';s=String(s);const m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);return m?m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]):''}
function _mapDocType(c){c=String(c||'').toLowerCase();
  if(/sop|wi|指導/.test(c))return'sop';if(/proc|程序/.test(c))return'procedure';
  if(/form|表/.test(c))return'form';if(/manual|手冊/.test(c))return'manual';
  if(/legal|法/.test(c))return'legal';if(/cust|客/.test(c))return'customer';
  if(/cert|證/.test(c))return'certificate';return'other'}
function _pushLegacyMsg(r){
  const subj=r.title_zh||r.title_en||r.subject||r.fn||'';
  if(!subj||DB.msg.some(x=>x.subject===subj&&x.date===_nd(r.date_received)))return 0;
  DB.msg.push({id:uid('MSG'),date:_nd(r.date_received),from:r.source_org_zh||r.source_org||r.sender||'',
    subject:subj,msgType:'email',auditId:'',
    content:[r.summary_zh,r.summary_en,r.action_note,r.doc_code?('編號 '+r.doc_code):''].filter(Boolean).join('\n'),
    convertedTo:'',photos:[],createdAt:Date.now(),updatedAt:Date.now()});
  return 1}
function migrateDCC(){
  let raw=localStorage.getItem('vrt_dcc_v2');
  if(!raw)return toast(LANG==='zh'?'找不到 vrt_dcc_v2 舊資料（需同網域）':'vrt_dcc_v2 not found');
  let S;try{S=JSON.parse(raw)}catch(e){return toast('vrt_dcc_v2 JSON error')}
  let nd=0,nc=0,ne=0;
  (S.docs||[]).forEach(d=>{
    const no=d.docNum||d.docNo||'';if(no&&DB.documents.some(x=>x.docNo===no))return;
    DB.documents.push({id:uid('DOC'),docNo:no,title:d.title||d.fn||'',category:'internal',
      docType:_mapDocType(d.cat||d.type),version:d.ver||d.version||'',dept:'',owner:d.owner||'',
      approvedBy:'',effectiveDate:_nd(d.date||d.eff),expiryDate:_nd(d.expiry||d.exp),copies:'',
      distribution:'',location:'',status:(String(d.status||'active').toLowerCase()==='active'?'active':'review'),
      history:'',remark:d.remarks||d.notes||'',photos:[],createdAt:Date.now(),updatedAt:Date.now()});nd++});
  (S.certs||[]).forEach(c=>{
    const ttl=(c.holder||'')+' — '+(c.type||'Certificate');
    if(DB.documents.some(x=>x.title===ttl&&x.expiryDate===_nd(c.expiry)))return;
    DB.documents.push({id:uid('DOC'),docNo:c.docNo||'',title:ttl,category:'external',docType:'certificate',
      version:'',dept:'',owner:c.holder||'',approvedBy:'',effectiveDate:_nd(c.issue),expiryDate:_nd(c.expiry),
      copies:'',distribution:'',location:'',status:'active',history:'',
      remark:[c.nat,c.remarks].filter(Boolean).join(' / '),photos:[],createdAt:Date.now(),updatedAt:Date.now()});nc++});
  (S.ext||[]).forEach(r=>{ne+=_pushLegacyMsg(r)});
  DB.meta.updatedAt=Date.now();saveDB();renderNavCounts();
  toast((LANG==='zh'?'DCC 遷移完成：文件 ':'DCC migrated: docs ')+nd+' / '+(LANG==='zh'?'證書 ':'certs ')+nc+' / '+(LANG==='zh'?'外來文件 ':'ext ')+ne)}
function migrateMSG(){
  let raw=localStorage.getItem('msgProcessor_data');
  if(!raw)return toast(LANG==='zh'?'找不到 msgProcessor_data 舊資料（需同網域）':'msgProcessor_data not found');
  let S;try{S=JSON.parse(raw)}catch(e){return toast('msgProcessor_data JSON error')}
  let n=0;((S.results)||[]).forEach(r=>{if(r.status!=='error')n+=_pushLegacyMsg(r)});
  DB.meta.updatedAt=Date.now();saveDB();renderNavCounts();
  toast((LANG==='zh'?'MSG 遷移完成：':'MSG migrated: ')+n)}
window.migrateDCC=migrateDCC;window.migrateMSG=migrateMSG;

function migrateTRAIN(){
  let raw=localStorage.getItem('vrt3_tr'),rc=localStorage.getItem('vrt3_rc');
  if(!raw)return toast(LANG==='zh'?'找不到舊培訓資料 vrt3_tr（需同網域）':'vrt3_tr not found');
  let L,R;try{L=JSON.parse(raw);R=JSON.parse(rc||'{}')}catch(e){return toast('vrt3_tr JSON error')}
  let n=0;
  (Array.isArray(L)?L:[]).forEach(x=>{
    const name=x.name||x.title||x.course||'';if(!name)return;
    const dt=_nd(x.date||x.planDate||x.start);
    if(DB.training.some(r=>r.course===name&&r.date===dt))return;
    const recs=(R&&R[x.id])||{};const att=Object.keys(recs).length;
    DB.training.push({id:uid('TRN'),course:name,category:'other',date:dt||todayStr(),
      status:(String(x.status||'').toLowerCase()==='done'||att>0)?'done':'planned',
      trainer:x.trainer||x.lecturer||'',department:x.dept||x.department||'',
      attendees:att||Number(x.attendees||0)||'',hours:Number(x.hours||0)||'',passRate:'',
      auditId:'',notes:x.notes||x.remark||'',photos:[],_created:Date.now(),_updated:Date.now()});
    n++;});
  DB.meta.updatedAt=Date.now();saveDB();renderNavCounts();
  toast((LANG==='zh'?'培訓遷移完成：':'Training migrated: ')+n);
}
